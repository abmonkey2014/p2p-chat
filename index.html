<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSN P2P Group Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --user-color: #dcf8c6; --font-size: 14px; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #ccd9ea; margin: 0; 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
        }

        #messenger-window { 
            width: 450px; height: 600px; background: white; border: 2px solid #005a9e; 
            display: flex; flex-direction: column; box-shadow: 10px 10px 25px rgba(0,0,0,0.3); 
            position: relative;
        }

        #header { 
            background: linear-gradient(to bottom, #0078d7, #005a9e); 
            color: white; padding: 10px; font-weight: bold; display: flex; justify-content: space-between;
        }

        #toolbar { 
            background: #f0f0f0; padding: 8px; border-bottom: 1px solid #ccc; 
            display: flex; gap: 8px; font-size: 11px; align-items: center; 
        }

        #messages { 
            flex-grow: 1; overflow-y: auto; padding: 15px; background: #fff; 
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Chat Bubbles */
        .msg { 
            max-width: 85%; padding: 8px 12px; border-radius: 12px; 
            font-size: var(--font-size); position: relative; line-height: 1.4;
            word-wrap: break-word; border: 1px solid rgba(0,0,0,0.05);
        }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; }
        .msg-meta { font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; opacity: 0.7; }
        
        .received { align-self: flex-start; background: #f1f0f0; color: #333; }
        .sent { align-self: flex-end; background: var(--user-color); color: #000; }

        #input-area { padding: 10px; border-top: 1px solid #ccc; background: #f9f9f9; }
        .input-row { display: flex; gap: 5px; }
        input[type="text"] { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #0078d7; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a9e; }

        /* Login Screen */
        .overlay { 
            position: absolute; inset: 0; background: #fff; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; text-align: center;
        }
        .overlay input { margin: 10px 0; padding: 10px; width: 100%; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div id="messenger-window">
    <div id="header">
        <span>MSN Group Chat</span>
        <span id="room-display">Offline</span>
    </div>

    <div id="login-screen" class="overlay">
        <h2 style="color:#005a9e; margin-bottom:0;">Welcome</h2>
        <p style="font-size:12px; color:#666;">P2P Encrypted Group Messaging</p>
        <input type="text" id="username" placeholder="Pick a Nickname..." maxlength="15">
        <input type="text" id="room-input" placeholder="Room ID (4 Letters)" maxlength="4" style="text-transform:uppercase; font-weight:bold; text-align:center;">
        <button onclick="joinGroup()" style="width:100%; padding:12px;">Sign In</button>
        <p style="font-size:10px; color:#999; margin-top:20px;">Direct connection: No messages are stored on any server.</p>
    </div>

    <div id="toolbar">
        Bubble: <input type="color" id="color-picker" value="#dcf8c6" onchange="updateSettings()">
        Text: <input type="number" id="font-input" value="14" min="10" max="30" style="width:40px" onchange="updateSettings()">
        <label style="cursor:pointer; color:#0078d7; font-weight:bold; margin-left:10px;">
            [📷 Send Photo] <input type="file" id="image-input" accept="image/*" hidden onchange="handleImage()">
        </label>
    </div>

    <div id="messages"></div>

    <div id="input-area">
        <div class="input-row">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendText()">Send</button>
        </div>
    </div>
</div>

<script>
    let peer = null;
    let connections = {}; // Stores all active peer connections
    let myName = "";
    let myRoom = "";

    // 1. Initial Setup on Load
    window.onload = () => {
        const hash = window.location.hash.substring(1).toUpperCase();
        if (hash && hash.length === 4) {
            document.getElementById('room-input').value = hash;
        }
    };

    function joinGroup() {
        myName = document.getElementById('username').value.trim() || "Guest";
        myRoom = document.getElementById('room-input').value.toUpperCase();
        
        if (myRoom.length !== 4) return alert("Please enter a 4-letter Room ID");

        // We use the room ID as part of our P2P address so we can "find" each other
        // Form: ROOM-NAME-RANDOMID
        const myFullId = `MSN-${myRoom}-${Math.floor(Math.random() * 10000)}`;
        peer = new Peer(myFullId);

        peer.on('open', (id) => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('room-display').innerText = "Room: " + myRoom;
            window.location.hash = myRoom;
            appendSystemMsg(`You joined group: ${myRoom}`);
            
            // This is a simple trick: We scan the PeerJS server for others with the same room prefix
            // Note: Since PeerJS doesn't allow "listing" IDs, in a real scenario you'd share your ID.
            // For this app, we tell the user to share the URL.
        });

        // Listen for anyone connecting to us
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // Error handling
        peer.on('error', (err) => {
            console.error(err);
            if(err.type === 'peer-unavailable') return; 
            alert("Connection error: " + err.type);
        });
    }

    function setupConnection(conn) {
        conn.on('open', () => {
            connections[conn.peer] = conn;
            // Send our name to the new person
            conn.send({ type: 'system', content: `${myName} connected.`, name: myName });
        });

        conn.on('data', (data) => {
            if (data.type === 'text') {
                appendMsg(data.name, data.content, 'received', data.color);
            } else if (data.type === 'image') {
                appendImg(data.name, data.content, 'received');
            } else if (data.type === 'system') {
                appendSystemMsg(data.content);
            }
        });

        conn.on('close', () => {
            delete connections[conn.peer];
            appendSystemMsg("A user left the chat.");
        });
    }

    // Connect to a new peer ID manually
    function connectToPeer(targetId) {
        if (connections[targetId] || targetId === peer.id) return;
        const conn = peer.connect(targetId);
        setupConnection(conn);
    }

    // 2. Messaging Functions
    function sendText() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text || !peer) return;

        const color = document.getElementById('color-picker').value;
        const payload = { type: 'text', content: text, name: myName, color: color };
        
        broadcast(payload);
        appendMsg("You", text, 'sent', color);
        input.value = "";
    }

    function handleImage() {
        const file = document.getElementById('image-input').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            const base64 = e.target.result;
            broadcast({ type: 'image', content: base64, name: myName });
            appendImg("You", base64, 'sent');
        };
        reader.readAsDataURL(file);
    }

    function broadcast(data) {
        Object.values(connections).forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    // 3. UI Helpers
    function appendMsg(user, text, type, color) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'sent') div.style.backgroundColor = color || 'var(--user-color)';
        
        div.innerHTML = `<span class="msg-meta">${user}</span>${escapeHTML(text)}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function appendImg(user, src, type) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="msg-meta">${user}</span><img src="${src}" onclick="window.open(this.src)">`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function appendSystemMsg(text) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.style.textAlign = "center";
        div.style.fontSize = "10px";
        div.style.color = "#888";
        div.style.margin = "5px 0";
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function updateSettings() {
        const root = document.documentElement;
        root.style.setProperty('--user-color', document.getElementById('color-picker').value);
        root.style.setProperty('--font-size', document.getElementById('font-input').value + 'px');
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    document.getElementById('msg-input').addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendText();
    });
</script>

</body>
</html>
